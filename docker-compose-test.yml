services:
  mysql:
    image: mysql:8.0.32
    container_name: letchat-test-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: letchat
    ports:
      - "33306:3306"
    volumes:
      - ./docs/mysql/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s

  redis:
    image: redis:6.2
    container_name: letchat-test-redis
    restart: unless-stopped
    ports:
      - "36379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: letchat-test-rabbitmq
    restart: unless-stopped
    ports:
      - "35672:5672"
      - "35673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
