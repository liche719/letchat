server:
  port: ${SERVER_PORT:7070}
  servlet:
    context-path: /api

ws:
  port: ${WS_PORT:7071}

spring:
  application:
    name: letchat
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/letchat?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:letchat}
    password: ${DB_PASSWORD:change-me}
  redis:
    database: ${REDIS_DATABASE:1}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    jedis:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:20}
        max-wait: ${REDIS_POOL_MAX_WAIT:-1}
        max-idle: ${REDIS_POOL_MAX_IDLE:10}
        min-idle: ${REDIS_POOL_MIN_IDLE:0}
    timeout: ${REDIS_TIMEOUT:2000}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:letchat}
    password: ${RABBITMQ_PASSWORD:change-me}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        concurrency: ${RABBITMQ_LISTENER_CONCURRENCY:5}
        max-concurrency: ${RABBITMQ_LISTENER_MAX_CONCURRENCY:10}
        prefetch: ${RABBITMQ_LISTENER_PREFETCH:20}
        acknowledge-mode: manual
        default-requeue-rejected: false
    connection-timeout: ${RABBITMQ_CONNECTION_TIMEOUT:10000}

logging:
  level:
    com.letchat: ${LOG_LEVEL_LETCHAT:DEBUG}
  pattern:
    dateformat: HH:mm:ss:SSS

knife4j:
  enable: true
  openapi:
    title: LetChat API
    description: LetChat API documentation.
    email: ${KNIFE4J_EMAIL:admin@example.com}
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.letchat.controller

project:
  folder: ${PROJECT_FOLDER:./files/}

admin:
  emails: ${ADMIN_EMAILS:admin@example.com}

kimi:
  enabled: ${KIMI_ENABLED:false}
  api-key: ${KIMI_API_KEY:}
  model: ${KIMI_MODEL:moonshot-v1-8k}
